name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - intake-service
          - eligibility-service
          - records-service
          - scheduling-service
          - interop-service
          - roi-service
          - ai-orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r services/${{ matrix.service }}/requirements.txt
      - name: Import smoke test
        working-directory: services/${{ matrix.service }}
        run: python -c "import app; print('${{ matrix.service }} ok')"

  # NOTE: no dependency vulnerability scan, no container image scan, and no
  # secret-scanning step. Images are built and pushed straight from main.
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, services]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
